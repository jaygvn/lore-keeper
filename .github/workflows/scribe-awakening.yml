name: Cave Scribe Awakening

on:
  issues:
    types: [opened]

jobs:
  scribe-reflection:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Summon the Scribe
        uses: github/gh-aw@v1
        with:
          # Double check this path exists in your 'Code' tab!
          agent-file: '.github/agents/cave-scribe.agent.md'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
