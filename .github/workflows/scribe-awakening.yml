name: Cave Scribe Awakening

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      message:
        description: 'Message for the Cave Scribe'
        required: false
        default: 'The pond stirs...'

jobs:
  scribe-reflection:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Checkout Sacred Pond
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: |
          npm install @google/generative-ai
          npm install @octokit/rest

      - name: List files (debug step)
        run: |
          echo "📂 Checking files:"
          ls -la .github/scripts/
          ls -la .github/agents/ || echo "agents folder not found"
          ls -la scribe.agent.md || echo "scribe.agent.md not found at root"

      - name: Awaken the Cave Scribe
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MANUAL_MESSAGE: ${{ github.event.inputs.message }}
        run: node .github/scripts/awaken-scribe.js
