name: Cave Scribe Awakening

on:
  issues:
    types: [opened, edited]

jobs:
  scribe-reflection:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Checkout Sacred Pond
        uses: actions/checkout@v4

      - name: Summon the Scribe
        # Updated to the specific stable 2026 release
        uses: github/gh-aw@v1.0.4
        with:
          agent-file: '.github/agents/cave-scribe.agent.md'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
