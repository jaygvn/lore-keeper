name: Cave Scribe Awakening

on:
  issues:
    types: [opened, edited]
  pull_request:
    types: [opened]

jobs:
  scribe-reflection:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Summon the Scribe
        uses: github/gh-aw@v1
        with:
          agent-file: '.github/agents/cave-scribe.agent.md'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
