name: Cave Scribe Awakening

on:
  issue_comment:
    types: [created]
  workflow_dispatch: 

jobs:
  scribe-reflection:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: write
    steps:
      - name: Checkout Sacred Pond
        uses: actions/checkout@v4

      - name: Manifest the Scribe
        uses: github/gh-aw@v1  # Fixed: removed duplicate 'uses:'
        with:
          agent-file: '.github/agents/cave-scribe.agent.md'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
